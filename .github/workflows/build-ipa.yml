name: Build IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | head -1)"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project ServerHost.xcodeproj \
            -scheme ServerHost \
            -archivePath build/ServerHost.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ARCHS=arm64 \
            | tee build/archive.log

      - name: Package IPA (unsigned)
        run: |
          mkdir -p build/Payload
          cp -r build/ServerHost.xcarchive/Products/Applications/ServerHost.app build/Payload/
          cd build
          zip -r ServerHost.ipa Payload
          ls -lh ServerHost.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServerHost-ipa
          path: build/ServerHost.ipa
          retention-days: 30
